import os
import re
import time
import base64
from google.auth.transport.requests import Request
from google.oauth2.credentials import Credentials
from google_auth_oauthlib.flow import InstalledAppFlow
from googleapiclient.discovery import build

SCOPES = ['https://www.googleapis.com/auth/gmail.modify']

BASE_DIR         = os.path.dirname(os.path.dirname(__file__))
CREDENTIALS_FILE = os.path.join(BASE_DIR, 'credentials.json')
TOKEN_FILE       = os.path.join(BASE_DIR, 'token.json')


def get_gmail_service():
    creds = None
    if os.path.exists(TOKEN_FILE):
        creds = Credentials.from_authorized_user_file(TOKEN_FILE, SCOPES)
    if not creds or not creds.valid:
        if creds and creds.expired and creds.refresh_token:
            creds.refresh(Request())
        else:
            flow = InstalledAppFlow.from_client_secrets_file(CREDENTIALS_FILE, SCOPES)
            creds = flow.run_local_server(port=0)
        with open(TOKEN_FILE, 'w') as token:
            token.write(creds.to_json())
    return build('gmail', 'v1', credentials=creds)


def get_otp_from_gmail(sender_filter='skyelectric', subject_filter='OTP',
                        wait_seconds=90, poll_interval=5,
                        since_timestamp=None):
    service    = get_gmail_service()
    start_time = time.time()

    # Mark all current unread OTP emails as read BEFORE waiting
    # so we only pick up NEW ones that arrive after login tap
    _mark_existing_otps_as_read(service, sender_filter)

    print(f"\n⏳ Waiting for NEW OTP email (max {wait_seconds}s)...")

    while time.time() - start_time < wait_seconds:
        try:
            # Get ANY unread email from skyelectric in last 10 min
            query   = f'from:{sender_filter} is:unread newer_than:10m'
            results = service.users().messages().list(
                userId='me', q=query, maxResults=5
            ).execute()

            messages = results.get('messages', [])
            print(f"   Found {len(messages)} new unread email(s)")

            for msg_stub in messages:
                msg = service.users().messages().get(
                    userId='me', id=msg_stub['id'], format='full'
                ).execute()

                body = extract_email_body(msg)
                print(f"   📧 Checking email body ({len(body)} chars)...")

                otp = extract_otp_from_text(body)
                if otp:
                    print(f"✅ OTP found: {otp}")
                    mark_as_read(service, msg_stub['id'])
                    return otp
                else:
                    print(f"  No OTP in body. Preview: {body[:300]}")

        except Exception as e:
            print(f"⚠️  Gmail error: {e}")

        remaining = int(wait_seconds - (time.time() - start_time))
        print(f"   Retrying in {poll_interval}s ({remaining}s remaining)...")
        time.sleep(poll_interval)

    print(" OTP not received within timeout")
    return None


def _mark_existing_otps_as_read(service, sender_filter):
    """Mark all current unread OTP emails as read before test starts."""
    try:
        query   = f'from:{sender_filter} is:unread'
        results = service.users().messages().list(
            userId='me', q=query, maxResults=20
        ).execute()
        messages = results.get('messages', [])
        if messages:
            print(f"   🧹 Marking {len(messages)} old OTP email(s) as read...")
            for msg in messages:
                mark_as_read(service, msg['id'])
    except Exception as e:
        print(f"⚠️  Could not clear old emails: {e}")


def mark_as_read(service, msg_id):
    try:
        service.users().messages().modify(
            userId='me', id=msg_id,
            body={'removeLabelIds': ['UNREAD']}
        ).execute()
    except Exception as e:
        print(f"⚠️  Could not mark as read: {e}")


def extract_email_body(msg):
    payload = msg.get('payload', {})
    data = payload.get('body', {}).get('data', '')
    if data:
        return base64.urlsafe_b64decode(data).decode('utf-8', errors='ignore')
    for part in payload.get('parts', []):
        if part.get('mimeType') == 'text/plain':
            data = part.get('body', {}).get('data', '')
            if data:
                return base64.urlsafe_b64decode(data).decode('utf-8', errors='ignore')
        for sub in part.get('parts', []):
            if sub.get('mimeType') == 'text/plain':
                data = sub.get('body', {}).get('data', '')
                if data:
                    return base64.urlsafe_b64decode(data).decode('utf-8', errors='ignore')
    return ""

def extract_otp_from_text(text):
    """Extract OTP — SkyElectric format: '737160' is your One-Time Passcode"""
    # patterns = [
    #     r"'(\d{6})'",           # '737160' — SkyElectric exact format
    #     r'"(\d{6})"',           # "737160" — double quoted
    #     r'OTP[:\s]+(\d{6})',
    #     r'Passcode[:\s]+(\d{6})',
    #     r'passcode[:\s]+(\d{6})',
    #     r'\b(\d{6})\b',         # any 6-digit number fallback
    # ]
    patterns = [
        r"'(\d{6,7})'",   # '5303341'
        r'"(\d{6,7})"',   # "5303341"
        r'OTP[:\s]+(\d{6,7})',
        r'Passcode[:\s]+(\d{6,7})',
    ]
    for pattern in patterns:
        match = re.search(pattern, text, re.IGNORECASE)
        if match:
            return match.group(1)
    return None

